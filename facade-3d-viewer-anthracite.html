<!DOCTYPE html>
<!-- ═══════════════════════════════════════════════════════════════
     FAÇADES · Viewer 3D (Three.js) — panneau paramétrique
     - Panneau façade aux dimensions exactes (mm), épaisseur 18 mm
     - Texture chêne doré réelle (décor extrait du modèle GLB clim-box)
     - Sens du motif bois vertical / horizontal
     - Perçages charnières Ø35 percés dans la face intérieure (3D réelle),
       avec cotes bleues (trou haut / trou bas / retrait) et bascule
       automatique de la vue vers la face intérieure
     - Cotes 3D (H × L en mm) affichées dès que le client a saisi ses dimensions
     - Reçoit les dimensions par postMessage :
         { cbType:'facade-dims', w:<mm>, h:<mm>, grain:'vertical'|'horizontal',
           hinge:<bool>, side:'left'|'right', top:<mm>, bot:<mm>, ins:<mm> }
     À héberger tel quel (GitHub Pages) et intégrer en <iframe>.
     ═══════════════════════════════════════════════════════════════ -->
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Façade — aperçu 3D</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;}
  body{
    font-family:"Poppins","Helvetica Neue",Arial,sans-serif;
    /* fond clair : le panneau ANTHRACITE (foncé) ressort fortement sur clair */
    background:radial-gradient(120% 100% at 50% 0%, #fbfbf9 0%, #f0f0ec 55%, #e6e6e0 100%);
  }
  #fv-canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none;}
  #fv-canvas:active{cursor:grabbing;}
  .fv-hint{
    position:absolute;left:50%;top:12px;transform:translateX(-50%);
    font-size:11px;color:#8a8a86;background:rgba(255,255,255,.75);
    padding:5px 12px;border-radius:99px;pointer-events:none;white-space:nowrap;
  }
  .fv-bar{
    position:absolute;right:14px;bottom:12px;display:none;align-items:center;gap:8px;
    background:rgba(255,255,255,.85);padding:7px 12px;border-radius:10px;
    font-size:12px;color:#3a3a38;user-select:none;cursor:pointer;
  }
  .fv-bar input{position:absolute;opacity:0;width:0;height:0;}
  .fv-switch{
    width:34px;height:19px;border-radius:99px;background:#d0d0ca;position:relative;transition:background .2s;flex:0 0 auto;
  }
  .fv-switch:before{
    content:'';position:absolute;width:15px;height:15px;left:2px;top:2px;border-radius:50%;
    background:#fff;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.25);
  }
  .fv-bar input:checked + .fv-switch{background:#909C06;}
  .fv-bar input:checked + .fv-switch:before{transform:translateX(15px);}
</style>
</head>
<body>
<canvas id="fv-canvas"></canvas>
<div class="fv-hint">Glissez pour pivoter · molette pour zoomer</div>
<label class="fv-bar" id="fv-bar">
  <input type="checkbox" id="fv-dims" checked>
  <span class="fv-switch"></span>
  <span>Cotes</span>
</label>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    t.wrapS = THREE.RepeatWrapping;
    t.wrapT = THREE.RepeatWrapping;

  /* Échelle PHYSIQUE fixe du décor, calibrée sur un échantillon réel 40×80 cm :
     en travers du fil le décor couvre ~80 cm ; le long du fil ~123 cm
     (proportions 1920×1244 de l'image). Le motif garde donc la même taille
     de veinage quelle que soit la dimension du panneau, et se répète au-delà. */
  var DECOR_ACROSS = 80;                          // cm, en travers du fil (axe 1244 px)
  var DECOR_ALONG  = 80 * 1920 / 1244;            // ≈123,5 cm, le long du fil (axe 1920 px)

  /* Texture « panneau de particules » (aggloméré) pour l'intérieur des perçages :
     le mélaminé percé laisse voir le cœur du panneau, pas le décor bois. */
  var coreTex = (function(){
    var c = document.createElement('canvas');
    c.width = c.height = 256;
    var x = c.getContext('2d');
    x.fillStyle = '#c9b28c';
    x.fillRect(0, 0, 256, 256);
    for(var i = 0; i < 9000; i++){
      var w = 1 + Math.random()*3, h = 1 + Math.random()*2;
      x.fillStyle = Math.random() < 0.5
        ? 'rgba(118,92,58,' + (0.12 + Math.random()*0.28) + ')'
        : 'rgba(242,228,198,' + (0.12 + Math.random()*0.28) + ')';
      x.fillRect(Math.random()*256, Math.random()*256, w, h);
    }
    var t = new THREE.CanvasTexture(c);
    t.wrapS = t.wrapT = THREE.RepeatWrapping;
    t.repeat.set(80, 80);
    t.anisotropy = MAX_ANISO;
    if(THREE.sRGBEncoding) t.encoding = THREE.sRGBEncoding;
    return t;
  })();

  function makeMaterials(){
    /* Façade ANTHRACITE · mat sablé : gris foncé uni, pas de décor bois */
    var face = new THREE.MeshStandardMaterial({
      color:0x3f4245, roughness:0.62, metalness:0
    });
    /* âme du panneau (aggloméré mélaminé) visible à l'intérieur des perçages */
    var core = new THREE.MeshStandardMaterial({
      map: coreTex, color:0xffffff, roughness:0.92, metalness:0
    });
    return { face:face, core:core };
  }

  function disposeGroup(g){
    g.traverse(function(o){
      if(o.geometry) o.geometry.dispose();
      if(o.material){
        if(Array.isArray(o.material)) o.material.forEach(function(m){ m.dispose(); });
        else o.material.dispose();
      }
    });
  }

    g.add(dashed([-W/2,-H/2,fz],[-W/2,yb,fz],col)); g.add(dashed([W/2,-H/2,fz],[W/2,yb,fz],col));
    var lw=makeDimLabel(fmtMm(W)); lw.position.set(0, yb-2.9, fz); g.add(lw);
    // Hauteur — du côté opposé aux perçages (à droite sinon)
    var hs = (holes && holes.length===2 && holes[0].x > 0) ? -1 : 1;
    var xr = hs * (W/2 + off);
    g.add(tube([xr,-H/2,fz],[xr,H/2,fz],r,col));
    tick([xr,-H/2,fz],[1,0,0],col); tick([xr,H/2,fz],[1,0,0],col);
    g.add(dashed([hs*W/2,-H/2,fz],[xr,-H/2,fz],col)); g.add(dashed([hs*W/2,H/2,fz],[xr,H/2,fz],col));
    var lh=makeDimLabel(fmtMm(H)); lh.position.set(xr+hs*3.2, 0, fz); g.add(lh);
    // Cotes des perçages charnières — en bleu, sur la face intérieure (arrière)
    if(holes && holes.length===2 && !state.hideHingeCotes){
      var zb=-T/2-0.06, zLab=-T/2-2.5, BLUE_BG='rgba(74,127,181,0.94)';
      var hx=holes[0].x, yTop=holes[0].y, yBot=holes[1].y;
      var edgeX=(hx>=0? 1 : -1)*W/2;
      // retrait latéral : bord → centre, juste sous le trou haut
      var yIns = yTop - HINGE_R*1.3 - 1.4;
      g.add(tube([edgeX,yIns,zb],[hx,yIns,zb],r,blue));
      tick([edgeX,yIns,zb],[0,1,0],blue); tick([hx,yIns,zb],[0,1,0],blue);
      g.add(dashed([hx,yTop,zb],[hx,yIns,zb],blue));
      var li=makeDimLabel(fmtMmVal(state.insMm),BLUE_BG); li.position.set((edgeX+hx)/2, yIns-2.8, zLab); g.add(li);
      // trou haut : bord supérieur → centre du trou haut
      g.add(tube([hx,H/2,zb],[hx,yTop,zb],r,blue));
      tick([hx,H/2,zb],[1,0,0],blue); tick([hx,yTop,zb],[1,0,0],blue);
      var ltop=makeDimLabel(fmtMmVal(state.topMm),BLUE_BG); ltop.position.set(hx,(H/2+yTop)/2,zLab); g.add(ltop);
      // trou bas : centre du trou bas → bord inférieur
      g.add(tube([hx,yBot,zb],[hx,-H/2,zb],r,blue));
      tick([hx,yBot,zb],[1,0,0],blue); tick([hx,-H/2,zb],[1,0,0],blue);
      var lbot=makeDimLabel(fmtMmVal(state.botMm),BLUE_BG); lbot.position.set(hx,(yBot-H/2)/2,zLab); g.add(lbot);
    }
    parent.add(g);
  }

  // ---- panneau percé : trous de charnières Ø35 dans la face arrière ----
  function makeBoredPanelData(width,H,T,holes){
    var pos=[],idx=[],idxCore=[],nrm=[],uv=[]; var hw=width/2,hh=H/2,ht=T/2,eps=0.002;
    function cl(x){return Math.max(-hw+eps,Math.min(hw-eps,x));}
    /* UV toujours à l'échelle PHYSIQUE : u normalisé par H, vv par la largeur,
       quelle que soit la face → le décor est COUPÉ sur les chants (18 mm de
       motif réel) au lieu d'y être comprimé/étiré. */
    function v(x,y,z,nx,ny,nz){pos.push(x,y,z);nrm.push(nx,ny,nz);var u,vv;if(Math.abs(ny)>0.5){u=(x+hw)/H;vv=(z+ht)/width;}else if(Math.abs(nx)>0.5){u=(y+hh)/H;vv=(z+ht)/width;}else{u=(y+hh)/H;vv=(x+hw)/width;}uv.push(u,vv);return pos.length/3-1;}
    function quad(a,b,c,d){idx.push(a,b,c,a,c,d);}
    function bq(x0,x1,y0,y1){x0=cl(x0);x1=cl(x1);if(!(x1>x0+1e-4&&y1>y0+1e-4))return;
      var p0=v(x0,y0,-ht,0,0,-1),p1=v(x1,y0,-ht,0,0,-1),p2=v(x1,y1,-ht,0,0,-1),p3=v(x0,y1,-ht,0,0,-1);quad(p3,p2,p1,p0);}
    // face avant + chants
    var f0=v(-hw,-hh,ht,0,0,1),f1=v(hw,-hh,ht,0,0,1),f2=v(hw,hh,ht,0,0,1),f3=v(-hw,hh,ht,0,0,1);quad(f0,f1,f2,f3);
    var a0=v(hw,-hh,-ht,1,0,0),a1=v(hw,-hh,ht,1,0,0),a2=v(hw,hh,ht,1,0,0),a3=v(hw,hh,-ht,1,0,0);quad(a0,a3,a2,a1);
    var b0=v(-hw,-hh,ht,-1,0,0),b1=v(-hw,-hh,-ht,-1,0,0),b2=v(-hw,hh,-ht,-1,0,0),b3=v(-hw,hh,ht,-1,0,0);quad(b0,b3,b2,b1);
    var c0=v(-hw,hh,ht,0,1,0),c1=v(hw,hh,ht,0,1,0),c2=v(hw,hh,-ht,0,1,0),c3=v(-hw,hh,-ht,0,1,0);quad(c0,c1,c2,c3);
    var e0=v(-hw,-hh,-ht,0,-1,0),e1=v(hw,-hh,-ht,0,-1,0),e2=v(hw,-hh,ht,0,-1,0),e3=v(-hw,-hh,ht,0,-1,0);quad(e0,e1,e2,e3);
    // face arrière : pleine, ou en bandes autour des trous
    if(!holes || !holes.length){
      bq(-hw,hw,-hh,hh);
      return {pos:pos,idx:idx,idxCore:idxCore,nrm:nrm,uv:uv};
    }
    var hx=holes[0].x,R=holes[0].r*1.3;
    var ys=holes.map(function(h){return h.y;}).sort(function(p,q){return p-q;});
    bq(-hw,hx-R,-hh,hh); bq(hx+R,hw,-hh,hh);
    var prev=-hh; ys.forEach(function(yc){bq(hx-R,hx+R,prev,yc-R);prev=yc+R;}); bq(hx-R,hx+R,prev,hh);
    var corners=[Math.PI/4,3*Math.PI/4,5*Math.PI/4,7*Math.PI/4];
    holes.forEach(function(h){
      var ccx=h.x,ccy=h.y,r=h.r,dep=h.depth,sq=[],cf=[],cb=[],wf=[],wb=[];
      var base=44,angs=[];for(var i=0;i<base;i++)angs.push(i/base*2*Math.PI);for(var c=0;c<4;c++)angs.push(corners[c]);
      angs.sort(function(a,b){return a-b;});var n=angs.length;
      for(var i=0;i<n;i++){var th=angs[i],co=Math.cos(th),si=Math.sin(th),m=Math.max(Math.abs(co),Math.abs(si));
        sq.push(v(cl(ccx+R*co/m),ccy+R*si/m,-ht,0,0,-1));
        cf.push(v(cl(ccx+r*co),ccy+r*si,-ht,0,0,-1));
        cb.push(v(cl(ccx+r*co),ccy+r*si,-ht+dep,0,0,-1));
        wf.push(v(cl(ccx+r*co),ccy+r*si,-ht,-co,-si,0));
        wb.push(v(cl(ccx+r*co),ccy+r*si,-ht+dep,-co,-si,0));}
      for(var i=0;i<n;i++){var j=(i+1)%n;idx.push(sq[i],cf[i],cf[j],sq[i],cf[j],sq[j]);}
      // parois et fond du perçage → matériau « aggloméré » (groupe séparé)
      for(var i=0;i<n;i++){var j=(i+1)%n;idxCore.push(wf[i],wb[i],wb[j],wf[i],wb[j],wf[j]);}
      var ctr=v(cl(ccx),ccy,-ht+dep,0,0,-1);
      for(var i=0;i<n;i++){var j=(i+1)%n;idxCore.push(ctr,cb[j],cb[i]);}
    });
    return {pos:pos,idx:idx,idxCore:idxCore,nrm:nrm,uv:uv};
  }
  function boredPanelGeo(width,H,T,holes){
    var d=makeBoredPanelData(width,H,T,holes);
    var g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(d.pos,3));
    g.setAttribute('normal',new THREE.Float32BufferAttribute(d.nrm,3));
    g.setAttribute('uv',new THREE.Float32BufferAttribute(d.uv,2));
    g.setIndex(d.idx.concat(d.idxCore));
    g.addGroup(0, d.idx.length, 0);                                      // mélaminé (décor bois)
    if(d.idxCore.length) g.addGroup(d.idx.length, d.idxCore.length, 1);  // intérieur des perçages
    return g;
  }

  // positions des 2 trous de charnières (cm), [] si pas de perçage valide
  function hingeHoles(W,H){
    if(!state.hinge) return [];
    var ins=state.insMm/10, top=state.topMm/10, bot=state.botMm/10;
    if(!(ins>0 && top>0 && bot>0)) return [];
    var yTop=H/2-top, yBot=-H/2+bot;
    if(yTop - yBot < 2*HINGE_R*1.3 + 0.3) return [];   // trous trop proches / qui se chevauchent
    if(ins >= W) return [];
    var x=(state.side==='left'? -1 : 1)*(W/2 - ins);   // vue face intérieure : gauche = -x
    return [{x:x,y:yTop,r:HINGE_R,depth:HINGE_DEPTH},{x:x,y:yBot,r:HINGE_R,depth:HINGE_DEPTH}];
  }

  // ---- construction paramétrique ----
  function build(){
    if(panel){ model.remove(panel); disposeGroup(panel); }
    panel = new THREE.Object3D();
    var W=state.W, H=state.H;
    var mats = makeMaterials();
    var holes = hingeHoles(W,H);
    panel.add(new THREE.Mesh(boredPanelGeo(W,H,T,holes), [mats.face, mats.core]));

    if(state.showDims && state.dimsReceived) addDimensions(panel, W, H, holes);
    document.getElementById('fv-bar').style.display = state.dimsReceived ? 'flex' : 'none';

    model.add(panel);
    // cadrage constant
    var maxDim = Math.max(W, H);
    model.scale.setScalar(72 / maxDim);
  }

  // ---- contrôles caméra maison ----
  var dragging=false, lastX=0, lastY=0;
  var viewTargetY=null;                     // rotation cible (bascule auto face avant / face intérieure)
  var flipStart=null, flipFrom=null;        // animation de bascule basée sur le temps
  var FLIP_DUR = 1.1;                       // durée (s)
  function pt(e){ return e.touches ? {x:e.touches[0].clientX,y:e.touches[0].clientY} : {x:e.clientX,y:e.clientY}; }
  function onDown(e){ dragging=true; viewTargetY=null; flipStart=null; var p=pt(e); lastX=p.x; lastY=p.y; }
  function onMove(e){
    if(!dragging) return;
    var p=pt(e);
    model.rotation.y += (p.x-lastX)*0.01;
    model.rotation.x += (p.y-lastY)*0.01;
    model.rotation.x = Math.max(-1.2, Math.min(1.2, model.rotation.x));
    lastX=p.x; lastY=p.y;
  }
  function onUp(){ dragging=false; }
  canvas.addEventListener("mousedown", onDown);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  window.addEventListener("blur", onUp);
  document.addEventListener("mouseleave", onUp);
  var lastTouchDist=0, lastTouchMid={x:0,y:0}, touching=0;
  canvas.addEventListener("touchstart", function(e){
    touching=e.touches.length;
    if(touching===1){ onDown(e); }
    else if(touching===2){
      dragging=false;
      var dx=e.touches[1].clientX-e.touches[0].clientX;
      var dy=e.touches[1].clientY-e.touches[0].clientY;
      lastTouchDist=Math.sqrt(dx*dx+dy*dy);
      lastTouchMid={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
    }
  }, {passive:true});
  canvas.addEventListener("touchmove", function(e){
    if(touching===1){ onMove(e); }
    else if(touching===2 && e.touches.length===2){
      e.preventDefault();
      var dx=e.touches[1].clientX-e.touches[0].clientX;
      var dy=e.touches[1].clientY-e.touches[0].clientY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var mid={x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
      camera.position.z = Math.max(110, Math.min(320, camera.position.z - (dist-lastTouchDist)*0.3));
      model.position.x += (mid.x-lastTouchMid.x)*0.08;
      model.position.y -= (mid.y-lastTouchMid.y)*0.08;
      lastTouchDist=dist;
      lastTouchMid=mid;
    }
  }, {passive:false});
  canvas.addEventListener("touchend", function(e){ touching=e.touches.length; onUp(); });
  canvas.addEventListener("wheel", function(e){
    e.preventDefault();
    camera.position.z = Math.max(110, Math.min(320, camera.position.z + e.deltaY*0.12));
  }, {passive:false});

  // ---- resize ----
  function resize(){
    var w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h, false);
    camera.aspect = w/h; camera.updateProjectionMatrix();
  }
  window.addEventListener("resize", resize);

  // ---- intro douce (zoom + rotation) ----
  var INTRO_DURATION = 2.4, introStartTime = null, introDone = false;
  var CAM_START_Z = 380, CAM_END_Z = 190, CAM_START_Y = 46, CAM_END_Y = 12;
  function easeOutCubic(t){ return 1-Math.pow(1-t,3); }
  function easeInOutCubic(t){ return t<0.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2; }
  function lerp(a,b,t){ return a+(b-a)*t; }

  function loop(timestamp){
    requestAnimationFrame(loop);
    if(!introDone){
      if(!introStartTime) introStartTime = timestamp;
      var t = Math.min((timestamp - introStartTime)/1000/INTRO_DURATION, 1);
      var tp = easeOutCubic(t);
      camera.position.z = lerp(CAM_START_Z, CAM_END_Z, tp);
      camera.position.y = lerp(CAM_START_Y, CAM_END_Y, tp);
      model.rotation.y = lerp(-0.9, -0.35, tp);
      if(t>=1) introDone = true;
    }
    // bascule douce vers la face demandée (avant / intérieure) — basée sur le temps
    if(viewTargetY!==null && !dragging){
      if(flipStart===null){ flipStart=timestamp; flipFrom={y:model.rotation.y, x:model.rotation.x}; }
      var ft = Math.min((timestamp - flipStart)/1000/FLIP_DUR, 1);
      var fe = easeInOutCubic(ft);
      model.rotation.y = lerp(flipFrom.y, viewTargetY, fe);
      model.rotation.x = lerp(flipFrom.x, -0.12, fe);
      if(ft>=1){ viewTargetY=null; flipStart=null; }
    }
    renderer.render(scene, camera);
  }

  // ---- toggle cotes ----
  document.getElementById('fv-dims').addEventListener('change', function(e){
    state.showDims = e.target.checked; build();
  });

  // ---- pont postMessage avec le wizard ----
  var lastKey='';
  function apply(d){
    var w = parseFloat(d.w), h = parseFloat(d.h);
    var grain = (d.grain==='horizontal') ? 'horizontal' : 'vertical';
    if(!(w>0 && h>0)) return;
    var hinge = !!d.hinge;
    var side = (d.side==='right') ? 'right' : 'left';
    var top = parseFloat(d.top)||0, bot = parseFloat(d.bot)||0, ins = parseFloat(d.ins)||0;
    var hideHingeCotes = !!d.hideHingeCotes;
    var key = [w,h,grain,hinge,side,top,bot,ins,hideHingeCotes].join('|');
    if(key===lastKey) return;
    lastKey = key;
    var prevHinge = state.hinge;
    state.W = Math.round(w/10*10)/10;   // mm → cm
    state.H = Math.round(h/10*10)/10;
    state.grain = grain;
    state.hinge = hinge; state.side = side;
    state.topMm = top; state.botMm = bot; state.insMm = ins;
    state.hideHingeCotes = hideHingeCotes;  // masque les cotes bleues des charnières tant que non réglables
    state.dimsReceived = true;
    // perçage activé/désactivé → tourner vers la face intérieure / revenir de face
    if(hinge !== prevHinge){
      viewTargetY = hinge ? Math.PI - 0.35 : -0.35;
      flipStart = null;
      // si l'intro est encore en cours, on la termine pour laisser la bascule jouer
      if(!introDone){ introDone = true; camera.position.z = CAM_END_Z; camera.position.y = CAM_END_Y; }
      dragging = false;
    }
    build();
  }
  window.addEventListener('message', function(ev){
    var d = ev.data;
    if(d && d.cbType==='facade-dims') apply(d);
  });

  // ---- init ----
  camera.position.set(0, CAM_START_Y, CAM_START_Z);
  resize(); build();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
